<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ALC — Últimos Registros</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#212F62">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f1f5f9;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #1e293b;
    }

    /* ── Top Bar ── */
    .topbar {
      background: #212F62; color: #fff;
      padding: 0 20px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .back-btn {
      background: rgba(255,255,255,0.12); border: none; color: #fff;
      padding: 6px 12px; border-radius: 7px; font-size: 13px;
      cursor: pointer; text-decoration: none; display: inline-block;
      font-family: inherit;
    }
    .back-btn:hover { background: rgba(255,255,255,0.2); }
    .topbar h1 { font-size: 16px; font-weight: 700; }

    /* ── Filtro ── */
    .toolbar {
      max-width: 780px; margin: 0 auto;
      padding: 20px 20px 0;
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }
    .filter-select {
      padding: 8px 12px; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 13px; font-family: inherit;
      background: #fff; color: #374151; outline: none;
    }
    .filter-select:focus { border-color: #212F62; }
    .search-inp {
      flex: 1; min-width: 180px;
      padding: 8px 12px; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 13px; font-family: inherit;
      background: #fff; color: #111; outline: none;
    }
    .search-inp:focus { border-color: #212F62; }
    .results-count {
      font-size: 12px; color: #94a3b8; font-weight: 600;
      padding: 4px 0;
    }

    /* ── Main ── */
    .main { max-width: 780px; margin: 0 auto; padding: 16px 20px 32px; }

    /* ── Cards ── */
    .rec-list { display: flex; flex-direction: column; gap: 10px; }

    .rec-card {
      background: #fff; border-radius: 12px;
      padding: 14px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      border: 1.5px solid #e2e8f0;
      display: flex; align-items: flex-start; gap: 14px;
    }
    .rec-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: #eff6ff; display: flex; align-items: center;
      justify-content: center; font-size: 20px; flex-shrink: 0;
    }
    .rec-info { flex: 1; min-width: 0; }
    .rec-title { font-size: 14px; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
    .rec-meta { font-size: 12px; color: #64748b; line-height: 1.6; }
    .rec-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
    .rec-badge {
      font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 6px;
      text-transform: uppercase;
    }
    .badge-rascunho   { background: #fff7ed; color: #c2410c; }
    .badge-finalizado { background: #f0fdf4; color: #15803d; }
    .badge-pdf  { background: #fef2f2; color: #dc2626; }
    .badge-word { background: #eff6ff; color: #1d4ed8; }

    .rec-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .btn-rec {
      padding: 5px 12px; border-radius: 7px; font-size: 11px;
      font-weight: 700; cursor: pointer; border: 1.5px solid;
      font-family: inherit; text-decoration: none; display: inline-block;
    }
    .btn-continuar { background: #212F62; color: #fff; border-color: #212F62; }
    .btn-reabrir   { background: #fff7ed; color: #c2410c; border-color: #fed7aa; }
    .btn-danger    { background: #fef2f2; color: #dc2626; border-color: #fecaca; }

    .empty-state {
      text-align: center; padding: 60px 20px; color: #94a3b8;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; margin-top: 6px; }

    .loading { text-align: center; padding: 40px; color: #94a3b8; font-size: 14px; }

    .badge-legado { background: #fdf4ff; color: #7c3aed; }
    .rec-file-link {
      display: inline-block; margin-top: 6px; font-size: 11px; font-weight: 700;
      color: #212F62; text-decoration: none; padding: 4px 10px;
      background: #eff6ff; border-radius: 6px;
    }
    .rec-file-link:hover { background: #dbeafe; }

    /* ── Modal upload laudo anterior ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300;
      display: none; align-items: center; justify-content: center; padding: 16px; }
    .overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 14px; padding: 24px; width: 100%;
      max-width: 460px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
    .modal h3 { font-size: 16px; font-weight: 800; color: #212F62; margin-bottom: 16px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 5px; }
    .field input, .field select {
      width: 100%; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: 13px; outline: none; font-family: inherit;
    }
    .field input:focus, .field select:focus { border-color: #212F62; }
    .modal-err { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
      border-radius: 8px; padding: 9px 12px; font-size: 13px; margin-bottom: 12px; display: none; }
    .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
    .btn-modal-save { flex: 1; background: #212F62; color: #fff; border: none; border-radius: 8px;
      padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-modal-cancel { flex: 1; background: #f1f5f9; color: #374151; border: none; border-radius: 8px;
      padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }

    @media (max-width: 500px) {
      .toolbar { padding: 16px 16px 0; }
      .main { padding: 16px 16px 24px; }
    }
  </style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-left">
    <a class="back-btn" href="menu.html">← Menu</a>
    <h1>🗂️ Últimos Registros</h1>
  </div>
  <button class="back-btn" onclick="openUploadModal()">📎 Adicionar laudo anterior</button>
</div>

<!-- Filtros -->
<div class="toolbar">
  <select class="filter-select" id="filter-modulo" onchange="applyFilters()">
    <option value="">Todos os módulos</option>
    <option value="NR-13">Inspeção NR-13</option>
    <option value="Legado">Laudo anterior (upload)</option>
  </select>
  <select class="filter-select" id="filter-status" onchange="applyFilters()">
    <option value="">Todos os status</option>
    <option value="rascunho">Rascunhos</option>
    <option value="finalizado">Finalizados</option>
  </select>
  <input class="search-inp" id="search-inp" type="text"
    placeholder="🔍 Buscar cliente, VP, relatório..."
    oninput="applyFilters()">
</div>
<div class="toolbar" style="padding-top:8px">
  <span class="results-count" id="results-count"></span>
</div>

<!-- Lista -->
<div class="main">
  <div id="rec-list" class="rec-list">
    <div class="loading">⏳ Carregando registros...</div>
  </div>
</div>

<!-- Modal: Adicionar laudo anterior -->
<div class="overlay" id="upload-overlay" onclick="if(event.target===this)closeUploadModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>📎 Adicionar laudo anterior</h3>
    <div class="modal-err" id="upload-err"></div>

    <div class="field" id="up-drive-status" style="font-size:11px;color:#64748b;margin-bottom:12px"></div>
    <div class="field">
      <label>Arquivo (PDF ou Word) <span style="font-weight:400;color:#94a3b8">— salvo no Google Drive em NR13/ano/mês</span></label>
      <input type="file" id="up-file" accept=".pdf,.doc,.docx">
    </div>
    <div class="field">
      <label>Link ou local do arquivo (opcional, se não anexar aqui)</label>
      <input type="text" id="up-link" placeholder="Ex: link do Google Drive ou pasta no computador">
    </div>
    <div class="field">
      <label>Cliente</label>
      <input type="text" id="up-cliente" placeholder="Ex: CARBEL NISSAN CONTORNO">
    </div>
    <div class="field">
      <label>Tag / Equipamento</label>
      <input type="text" id="up-tag" placeholder="Ex: VP-01">
    </div>
    <div class="field">
      <label>Local</label>
      <input type="text" id="up-local" placeholder="Ex: Fábrica - Contagem/MG">
    </div>
    <div class="field">
      <label>Data de realização (ART)</label>
      <input type="text" id="up-data-realizacao" placeholder="dd/mm/aaaa">
    </div>
    <div class="field">
      <label>Tipo de vencimento a controlar na Agenda</label>
      <select id="up-tipo-venc">
        <option value="data_prox_insp_ext">Próxima inspeção externa (NR-13)</option>
        <option value="data_prox_insp_int">Próxima inspeção interna (NR-13)</option>
        <option value="data_calib_manval">Calibração manômetro/válvula</option>
        <option value="data_prox_calib">Próxima calibração</option>
        <option value="data_prox_pront">Reconstituição de prontuário</option>
      </select>
    </div>
    <div class="field">
      <label>Data de realização do próximo serviço (vencimento)</label>
      <input type="text" id="up-data-vencimento" placeholder="dd/mm/aaaa">
    </div>

    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeUploadModal()">Cancelar</button>
      <button class="btn-modal-save" id="btn-upload-save" onclick="saveUpload()">Salvar</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
  // ── Auth check ──
  const session = (function(){
    try {
      const s = JSON.parse(localStorage.getItem('alc_session') || 'null');
      if (s && s.uid && (Date.now() - s.loginTime) < 8*60*60*1000) return s;
    } catch(e) {}
    return null;
  })();
  if (!session) { window.location.replace('login.html'); }

  const db = firebase.firestore();
  let allRecords = [];

  // Garante que o Firebase Auth restaure a sessão antes de ler/gravar no Firestore
  let _authReadyResolve;
  const authReady = new Promise(resolve => { _authReadyResolve = resolve; });
  firebase.auth().onAuthStateChanged(user => { _authReadyResolve(user); });

  // ── Parse de data BR (dd/mm/aaaa) ──
  function parseBRDate(s) {
    if (!s) return null;
    const p = s.trim().split('/');
    if (p.length !== 3) return null;
    const d = new Date(+p[2], +p[1]-1, +p[0]);
    return isNaN(d) ? null : d;
  }

  // ── Google Drive: token vem do login com Google (escopo drive.file) ──
  function getDriveToken() {
    // Token de OAuth do Google dura ~1h; se tiver mais de 50min, considera expirado
    if (!session.driveAccessToken || !session.driveTokenTime) return null;
    if (Date.now() - session.driveTokenTime > 50 * 60 * 1000) return null;
    return session.driveAccessToken;
  }

  async function reconectarGoogleDrive() {
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });
      provider.addScope('https://www.googleapis.com/auth/drive.file');
      const result = await firebase.auth().signInWithPopup(provider);
      const cred = firebase.auth.GoogleAuthProvider.credentialFromResult(result);
      if (cred && cred.accessToken) {
        session.driveAccessToken = cred.accessToken;
        session.driveTokenTime = Date.now();
        localStorage.setItem('alc_session', JSON.stringify(session));
      }
      updateDriveStatus();
    } catch(e) {
      showUploadErr('Não foi possível conectar ao Google Drive: ' + e.message);
    }
  }

  function updateDriveStatus() {
    const el = document.getElementById('up-drive-status');
    if (getDriveToken()) {
      el.innerHTML = '✅ Conectado ao Google Drive.';
    } else {
      el.innerHTML = '⚠️ Sem conexão com o Google Drive (necessário para anexar o arquivo). ' +
        '<a href="#" onclick="reconectarGoogleDrive();return false;" style="color:#212F62;font-weight:700">Conectar agora</a> ' +
        '— ou preencha só o campo de link/local abaixo.';
    }
  }

  // Busca (ou cria) uma subpasta pelo nome dentro de um parent no Drive
  async function driveFindOrCreateFolder(name, parentId, token) {
    const q = encodeURIComponent(`name='${name.replace(/'/g,"\\'")}' and mimeType='application/vnd.google-apps.folder' and trashed=false and '${parentId}' in parents`);
    const listRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, {
      headers: { Authorization: 'Bearer ' + token }
    });
    const listData = await listRes.json();
    if (listData.files && listData.files.length > 0) return listData.files[0].id;

    const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] })
    });
    const createData = await createRes.json();
    if (!createRes.ok) throw new Error(createData.error?.message || 'Erro ao criar pasta no Drive.');
    return createData.id;
  }

  // Sobe o arquivo para dentro da pasta NR13/ano/mês e retorna o link de visualização
  async function uploadFileToDrive(file, dataRealizacao, token) {
    const d = parseBRDate(dataRealizacao) || new Date();
    const ano = String(d.getFullYear());
    const mes = String(d.getMonth() + 1).padStart(2, '0') + ' - ' +
      ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][d.getMonth()];

    const rootId = await driveFindOrCreateFolder('NR13', 'root', token);
    const anoId = await driveFindOrCreateFolder(ano, rootId, token);
    const mesId = await driveFindOrCreateFolder(mes, anoId, token);

    // Cria o arquivo (metadados) já dentro da pasta certa
    const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: file.name, parents: [mesId] })
    });
    const createData = await createRes.json();
    if (!createRes.ok) throw new Error(createData.error?.message || 'Erro ao criar arquivo no Drive.');

    // Sobe o conteúdo do arquivo
    const uploadRes = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${createData.id}?uploadType=media`, {
      method: 'PATCH',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': file.type || 'application/octet-stream' },
      body: file
    });
    if (!uploadRes.ok) { const errData = await uploadRes.json(); throw new Error(errData.error?.message || 'Erro ao enviar conteúdo do arquivo.'); }

    // Permite abrir o link mesmo por quem não é dono do arquivo no Drive
    await fetch(`https://www.googleapis.com/drive/v3/files/${createData.id}/permissions`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ role: 'reader', type: 'anyone' })
    });

    const metaRes = await fetch(`https://www.googleapis.com/drive/v3/files/${createData.id}?fields=webViewLink`, {
      headers: { Authorization: 'Bearer ' + token }
    });
    const metaData = await metaRes.json();
    return metaData.webViewLink;
  }

  // ── Modal: Adicionar laudo anterior ──
  function openUploadModal() {
    document.getElementById('up-file').value = '';
    document.getElementById('up-link').value = '';
    document.getElementById('up-cliente').value = '';
    document.getElementById('up-tag').value = '';
    document.getElementById('up-local').value = '';
    document.getElementById('up-data-realizacao').value = '';
    document.getElementById('up-data-vencimento').value = '';
    document.getElementById('up-tipo-venc').value = 'data_prox_insp_ext';
    document.getElementById('upload-err').style.display = 'none';
    updateDriveStatus();
    document.getElementById('upload-overlay').classList.add('open');
  }
  function closeUploadModal() {
    document.getElementById('upload-overlay').classList.remove('open');
  }
  function showUploadErr(msg) {
    const el = document.getElementById('upload-err');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function saveUpload() {
    const file = document.getElementById('up-file').files[0];
    const link = document.getElementById('up-link').value.trim();
    const cliente = document.getElementById('up-cliente').value.trim();
    const tag = document.getElementById('up-tag').value.trim();
    const local = document.getElementById('up-local').value.trim();
    const dataRealizacao = document.getElementById('up-data-realizacao').value.trim();
    const tipoVenc = document.getElementById('up-tipo-venc').value;
    const dataVencimento = document.getElementById('up-data-vencimento').value.trim();
    const btn = document.getElementById('btn-upload-save');

    document.getElementById('upload-err').style.display = 'none';

    if (!cliente) { showUploadErr('Preencha o cliente.'); return; }
    if (dataRealizacao && !parseBRDate(dataRealizacao)) { showUploadErr('Data de realização inválida. Use dd/mm/aaaa.'); return; }
    if (dataVencimento && !parseBRDate(dataVencimento)) { showUploadErr('Data de vencimento inválida. Use dd/mm/aaaa.'); return; }
    if (file) {
      const ext = (file.name.split('.').pop() || '').toLowerCase();
      if (!['pdf','doc','docx'].includes(ext)) { showUploadErr('Só é permitido PDF ou Word (.doc/.docx).'); return; }
      if (!getDriveToken()) { showUploadErr('Conecte o Google Drive (link acima) antes de anexar o arquivo, ou deixe o campo de arquivo vazio e use o link/local manual.'); return; }
    }

    btn.disabled = true;
    btn.textContent = file ? 'Enviando ao Drive...' : 'Salvando...';

    try {
      const authUser = await authReady;
      if (!authUser) throw new Error('Sessão do Firebase expirada. Saia e faça login novamente.');

      let arquivoLink = link || '';
      if (file) {
        arquivoLink = await uploadFileToDrive(file, dataRealizacao, getDriveToken());
      }

      const formDataObj = {
        cliente_nome: cliente,
        tag_vaso: tag,
        local: local,
        data_termino: dataRealizacao,
      };
      if (dataVencimento) formDataObj[tipoVenc] = dataVencimento;

      await db.collection('registros').add({
        modulo: 'Legado',
        status: 'finalizado',
        cliente: cliente,
        vp: '',
        relatorio: '',
        data_inspecao: dataRealizacao,
        data_realizacao: dataRealizacao,
        local: local,
        usuario: session.name || session.username,
        uid: session.uid,
        formData: formDataObj,
        arquivoLink: arquivoLink || '',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      });

      closeUploadModal();
      loadRecords();
    } catch(e) {
      showUploadErr('Erro ao salvar: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Salvar';
    }
  }

  // ── Formata data ──
  function fmtDate(ts) {
    if (!ts) return '—';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric',
      hour:'2-digit', minute:'2-digit' });
  }

  // ── Ícone por módulo ──
  function moduleIcon(m) {
    if (m === 'NR-13') return '🔧';
    if (m === 'Calibração') return '⚙️';
    if (m === 'Legado') return '📎';
    return '📋';
  }

  // ── Renderiza cards ──
  function renderCards(records) {
    const list = document.getElementById('rec-list');
    document.getElementById('results-count').textContent =
      records.length + ' registro' + (records.length !== 1 ? 's' : '');

    if (records.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="icon">🗂️</div>
          <strong>Nenhum registro encontrado</strong>
          <p>Os documentos gerados aparecerão aqui automaticamente.</p>
        </div>`;
      return;
    }

    list.innerHTML = records.map(r => {
      const isFinal = r.status === 'finalizado';
      const statusBadge = isFinal
        ? '<span class="rec-badge badge-finalizado">✅ Finalizado</span>'
        : '<span class="rec-badge badge-rascunho">✏️ Rascunho</span>';
      const tipoBadge = r.tipo === 'PDF'
        ? '<span class="rec-badge badge-pdf">PDF</span>'
        : r.tipo === 'Word'
          ? '<span class="rec-badge badge-word">Word</span>'
          : '';

      // Ações conforme status
      let actions = '';
      if (r.modulo === 'NR-13') {
        if (!isFinal) {
          actions += `<a class="btn-rec btn-continuar" href="Laudo-VP-NR13.html?id=${r.id}">✏️ Continuar editando</a>`;
        } else {
          actions += `<a class="btn-rec btn-continuar" href="Laudo-VP-NR13.html?id=${r.id}">📄 Abrir PDF / QR</a>`;
        }
      }
      if (r.modulo === 'Legado' && r.arquivoLink) {
        const isUrl = /^https?:\/\//i.test(r.arquivoLink);
        actions += isUrl
          ? `<a class="btn-rec btn-continuar" href="${r.arquivoLink}" target="_blank">📎 Abrir link do arquivo</a>`
          : `<span class="btn-rec" style="background:#f8fafc">📎 ${r.arquivoLink}</span>`;
      }
      if (session && (session.role === 'admin' || session.role === 'master')) {
        if (isFinal) {
          actions += `<button class="btn-rec btn-reabrir" onclick="reabrir('${r.id}')">🔓 Reabrir</button>`;
        }
        actions += `<button class="btn-rec btn-danger" onclick="excluir('${r.id}')">🗑️ Excluir</button>`;
      }

      return `
      <div class="rec-card" id="card-${r.id}">
        <div class="rec-icon">${moduleIcon(r.modulo)}</div>
        <div class="rec-info">
          <div class="rec-title">${r.cliente || '—'}</div>
          <div class="rec-meta">
            <b>VP:</b> ${r.vp || '—'} &nbsp;·&nbsp;
            <b>Rel.:</b> ${r.relatorio || '—'}<br>
            <b>Inspeção:</b> ${r.data_inspecao || '—'} &nbsp;·&nbsp;
            <b>Local:</b> ${r.local || '—'}<br>
            <b>Data de realização (ART):</b> ${r.data_realizacao || '—'}<br>
            <b>Por:</b> ${r.usuario || '—'} &nbsp;·&nbsp;
            <b>Salvo:</b> ${fmtDate(r.updatedAt || r.createdAt)}
          </div>
          ${actions ? `<div class="rec-actions">${actions}</div>` : ''}
        </div>
        <div class="rec-badges">${statusBadge}${tipoBadge}</div>
      </div>`;
    }).join('');
  }

  // ── Filtros ──
  function applyFilters() {
    const modulo = document.getElementById('filter-modulo').value;
    const status = document.getElementById('filter-status').value;
    const search = document.getElementById('search-inp').value.toLowerCase();

    const filtered = allRecords.filter(r => {
      if (modulo && r.modulo  !== modulo) return false;
      if (status && r.status  !== status) return false;
      if (search) {
        const haystack = [r.cliente, r.vp, r.relatorio, r.local, r.usuario].join(' ').toLowerCase();
        if (!haystack.includes(search)) return false;
      }
      return true;
    });
    renderCards(filtered);
  }

  // ── Carrega do Firestore ──
  async function loadRecords() {
    try {
      const authUser = await authReady;
      if (!authUser) {
        document.getElementById('rec-list').innerHTML =
          `<div class="empty-state"><div class="icon">⚠️</div><strong>Sessão do Firebase expirada</strong><p>Saia e faça login novamente.</p></div>`;
        return;
      }
      let snap;
      try {
        snap = await db.collection('registros').orderBy('updatedAt', 'desc').limit(100).get();
      } catch(e) {
        snap = await db.collection('registros').orderBy('createdAt', 'desc').limit(100).get();
      }

      allRecords = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      // ordena por updatedAt ou createdAt descendente
      allRecords.sort((a, b) => {
        const ta = (a.updatedAt?.toDate?.() || a.createdAt?.toDate?.() || new Date(0)).getTime();
        const tb = (b.updatedAt?.toDate?.() || b.createdAt?.toDate?.() || new Date(0)).getTime();
        return tb - ta;
      });
      applyFilters();
    } catch(e) {
      document.getElementById('rec-list').innerHTML =
        `<div class="empty-state"><div class="icon">⚠️</div>
         <strong>Erro ao carregar</strong><p>${e.message}</p></div>`;
    }
  }

  // ── Reabrir como rascunho (admin/master) ──
  async function reabrir(id) {
    if (!confirm('Reabrir este laudo para edição?')) return;
    try {
      await authReady;
      await db.collection('registros').doc(id).update({ status: 'rascunho', updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      await loadRecords();
    } catch(e) { alert('Erro: ' + e.message); }
  }

  // ── Excluir ──
  async function excluir(id) {
    if (!confirm('Excluir este registro permanentemente?')) return;
    try {
      await authReady;
      await db.collection('registros').doc(id).delete();
      try { localStorage.removeItem('alc_draft_' + id); } catch(e){}
      document.getElementById('card-' + id)?.remove();
      allRecords = allRecords.filter(r => r.id !== id);
      applyFilters();
    } catch(e) { alert('Erro: ' + e.message); }
  }

  loadRecords();
</script>
</body>
</html>
