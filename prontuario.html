  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
  :root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3e;--accent:#3b82f6;--success:#22c55e;--warn:#f59e0b;--danger:#ef4444;--text:#e2e8f0;--muted:#64748b;--label:#94a3b8;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
  input,button,select,textarea{font-family:inherit;}
  #app{display:flex;flex-direction:column;min-height:100vh;}
  .topbar{background:#0d1219;border-bottom:1px solid var(--border);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .topbar-left{display:flex;align-items:center;gap:12px;}
  .topbar-brand{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.2px;}
  .topbar-brand span{color:#C81F25;}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .btn-menu{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--label);padding:5px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:background .15s;}
  .btn-menu:hover{background:rgba(255,255,255,0.13);color:var(--text);}
  .tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:#0d1219;padding:0 20px;overflow-x:auto;flex-shrink:0;}
  .tab-btn{padding:13px 16px;font-size:13px;font-weight:600;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab-btn:hover:not(.active){color:var(--text);}
  .content{flex:1;padding:24px 20px;max-width:820px;margin:0 auto;width:100%;}
  .section-title{font-size:16px;font-weight:700;color:var(--text);margin:0 0 16px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .subsection{font-size:13px;font-weight:700;color:var(--accent);margin:18px 0 10px;text-transform:uppercase;letter-spacing:.4px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .field-row.three{grid-template-columns:1fr 1fr 1fr;}
  .field-row.single{grid-template-columns:1fr;}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field label{font-size:12px;color:var(--label);font-weight:600;}
  .field input,.field select,.field textarea{background:#0f1117;border:1px solid var(--border);color:var(--text);padding:8px 11px;border-radius:7px;font-size:13px;outline:none;transition:border-color .15s;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
  .field textarea{resize:vertical;min-height:72px;line-height:1.5;}
  .field select option{background:#1a1d27;}
  .field .calc-result{background:#0d1219;border:1px solid var(--success);color:var(--success);padding:8px 11px;border-radius:7px;font-size:13px;font-weight:700;}
  .btn-primary{background:var(--accent);color:#fff;border:none;padding:10px 22px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;}
  .btn-primary:hover{background:#2563eb;}
  .btn-secondary{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--text);padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-secondary:hover{background:rgba(255,255,255,0.12);}
  .btn-danger{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:var(--danger);padding:6px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;}
  .btn-success{background:#16a34a;color:#fff;border:none;padding:10px 22px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;}
  .btn-success:hover{background:#15803d;}
  .photo-zone{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:border-color .15s;margin-bottom:8px;}
  .photo-zone:hover{border-color:var(--accent);}
  .photo-zone img{max-width:100%;max-height:200px;border-radius:8px;object-fit:contain;}
  .photo-zone p{color:var(--muted);font-size:13px;margin-top:8px;}
  .photo-actions{display:flex;gap:8px;justify-content:center;margin-top:6px;}
  .pages-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:10px;}
  .page-thumb{position:relative;background:#0d1219;border:1px solid var(--border);border-radius:8px;overflow:hidden;aspect-ratio:0.7;}
  .page-thumb img{width:100%;height:100%;object-fit:cover;}
  .page-thumb .del-page{position:absolute;top:4px;right:4px;background:rgba(239,68,68,.85);color:#fff;border:none;border-radius:4px;padding:2px 6px;font-size:11px;cursor:pointer;font-weight:700;}
  .page-thumb .page-num{position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,.6);color:#fff;border-radius:3px;padding:1px 5px;font-size:10px;}
  .pages-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .progress-bar{height:6px;background:var(--border);border-radius:3px;margin:10px 0;}
  .progress-bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s;}
  .summary-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
  .summary-item:last-child{border-bottom:none;}
  .summary-item .ok{color:var(--success);}
  .summary-item .miss{color:var(--muted);}
  .gerar-btns{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;}
  .formula-box{background:#0d1219;border:1px solid #334155;border-radius:8px;padding:12px 16px;margin:10px 0;font-size:12px;color:#94a3b8;line-height:1.8;}
  .formula-box code{color:#7dd3fc;font-family:monospace;font-size:13px;}
  @media(max-width:600px){.field-row,.field-row.three{grid-template-columns:1fr;}.tabs{gap:0;}.tab-btn{padding:11px 10px;font-size:12px;}}
  </style>
</head>

// ============================================================
// TAB NAVIGATION
// ============================================================
function showTab(t) {
  currentTab = t;
  var btns = document.querySelectorAll('.tab-btn');
  btns.forEach(function(b, i) {
    var tabs = ['capa','identificacao','dados','metodologia','ends','calibracao','anexos','gerar'];
    b.classList.toggle('active', tabs[i] === t);
  });
  var renders = {
    capa: renderCapa, identificacao: renderIdentificacao,
    dados: renderDados, metodologia: renderMetodologia,
    ends: renderENDs, calibracao: renderCalibTab,
    anexos: renderAnexos, gerar: renderGerar
  };
  document.getElementById('content').innerHTML = '';
  renders[t]();
}

// ============================================================
// HELPERS
// ============================================================
function fld(key, label, opts) {
  opts = opts || {};
  var v = fd[key] !== undefined ? fd[key] : '';
  if (opts.type === 'textarea') {
    return '<div class="field"><label>' + label + '</label>'
      + '<textarea rows="' + (opts.rows || 3) + '" oninput="fd[\'' + key + '\']=this.value">' + v + '</textarea></div>';
  }
  if (opts.type === 'select') {
    var sel = '<div class="field"><label>' + label + '</label><select onchange="fd[\'' + key + '\']=this.value">';
    opts.options.forEach(function(o) {
      sel += '<option value="' + o.v + '"' + (v === o.v ? ' selected' : '') + '>' + o.l + '</option>';
    });
    sel += '</select></div>';
    return sel;
  }
  return '<div class="field"><label>' + label + '</label>'
    + '<input type="' + (opts.type || 'text') + '" value="' + v.replace(/"/g,'&quot;') + '" placeholder="' + (opts.ph || '') + '"'
    + ' oninput="fd[\'' + key + '\']=this.value' + (opts.extra || '') + '">'
    + '</div>';
}

function row(items) { return '<div class="field-row">' + items.join('') + '</div>'; }
function row3(items) { return '<div class="field-row three">' + items.join('') + '</div>'; }
function row1(item) { return '<div class="field-row single">' + item + '</div>'; }
function card(title, body) {
  return '<div class="card"><div class="subsection">' + title + '</div>' + body + '</div>';
}

function calcPMTA() {
  var D = parseFloat((fd.proj_diam_interno||'').replace(',','.'));
  var sc = parseFloat((fd.pmta_s_cost||'').replace(',','.'));
  var ec = parseFloat((fd.pmta_e_cost||'').replace(',','.'));
  var espC = parseFloat((fd.pmta_esp_cost||'').replace(',','.'));
  var st = parseFloat((fd.pmta_s_tamp||'').replace(',','.'));
  var et = parseFloat((fd.pmta_e_tamp||'').replace(',','.'));
  var espT = parseFloat((fd.pmta_esp_tamp||'').replace(',','.'));

  var rEl = document.getElementById('pmta_r_disp');
  var cFEl = document.getElementById('pmta_cost_formula');
  var cREl = document.getElementById('pmta_cost_result');
  var tFEl = document.getElementById('pmta_tamp_formula');
  var tREl = document.getElementById('pmta_tamp_result');
  var aEl = document.getElementById('pmta_adotada');

  if (!rEl) return; // not on metodologia tab

  var R = isNaN(D) ? NaN : D / 2;
  if (rEl) rEl.textContent = isNaN(R) ? '—' : R.toFixed(2) + ' mm';

  var pmtaC = NaN, pmtaT = NaN;

  if (!isNaN(sc) && !isNaN(ec) && !isNaN(espC) && !isNaN(R)) {
    pmtaC = (sc * ec * espC) / (R - 0.6 * espC) * 10;
    if (cFEl) cFEl.textContent = '(' + sc + ' × ' + ec + ' × ' + espC.toFixed(2) + ') / (' + R.toFixed(2) + ' - 0,6×' + espC.toFixed(2) + ') ×10';
    if (cREl) cREl.textContent = pmtaC.toFixed(2) + ' bar';
  } else {
    if (cFEl) cFEl.textContent = '—';
    if (cREl) cREl.textContent = '—';
  }

  if (!isNaN(st) && !isNaN(et) && !isNaN(espT) && !isNaN(R)) {
    pmtaT = (st * et * espT) / (R + 0.1 * espT) * 10;
    if (tFEl) tFEl.textContent = '(' + st + ' × ' + et + ' × ' + espT.toFixed(2) + ') / (' + R.toFixed(2) + ' + 0,1×' + espT.toFixed(2) + ') ×10';
    if (tREl) tREl.textContent = pmtaT.toFixed(2) + ' bar';
  } else {
    if (tFEl) tFEl.textContent = '—';
    if (tREl) tREl.textContent = '—';
  }

  var pmtaAdot = NaN;
  if (!isNaN(pmtaC) && !isNaN(pmtaT)) pmtaAdot = Math.min(pmtaC, pmtaT);
  else if (!isNaN(pmtaC)) pmtaAdot = pmtaC;
  else if (!isNaN(pmtaT)) pmtaAdot = pmtaT;

  if (aEl) aEl.textContent = isNaN(pmtaAdot) ? '—' : pmtaAdot.toFixed(2) + ' bar';

  // Sync to fd
  if (!isNaN(pmtaAdot)) {
    fd.op_pmta_bar = pmtaAdot.toFixed(2).replace('.',',');
  }
  fd.pmta_r = isNaN(R) ? '' : R.toFixed(2);
}

function renderSinglePhotoHTML(varName, inputId) {
  return '<div class="photo-zone" id="' + varName + '_zone" onclick="document.getElementById(\'' + inputId + '\').click()">'
    + '<div id="' + varName + '_preview"><p>📷 Toque para capturar ou selecionar foto</p></div>'
    + '</div>'
    + '<input type="file" id="' + inputId + '" accept="image/*" capture="environment" style="display:none">'
    + '<div class="photo-actions" id="' + varName + '_actions" style="display:none">'
    + '<button class="btn-secondary" onclick="document.getElementById(\'' + inputId + '\').click()">Trocar</button>'
    + '<button class="btn-danger" onclick="clearSinglePhoto(\'' + varName + '\')">Remover</button>'
    + '</div>';
}

function bindSinglePhoto(varName, inputId) {
  var input = document.getElementById(inputId);
  if (!input) return;
  updateSinglePreview(varName);
  input.addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var r = new FileReader();
    r.onload = function(ev) {
      window[varName] = ev.target.result;
      if (varName === 'fotoEquip') fotoEquip = ev.target.result;
      updateSinglePreview(varName);
    };
    r.readAsDataURL(file);
  });
}

function updateSinglePreview(varName) {
  var val = (varName === 'fotoEquip') ? fotoEquip : window[varName];
  var prev = document.getElementById(varName + '_preview');
  var actions = document.getElementById(varName + '_actions');
  if (!prev) return;
  if (val) {
    prev.innerHTML = '<img src="' + val + '" style="max-height:180px;border-radius:8px;">';
    if (actions) actions.style.display = 'flex';
  } else {
    prev.innerHTML = '<p>📷 Toque para capturar ou selecionar foto</p>';
    if (actions) actions.style.display = 'none';
  }
}

function clearSinglePhoto(varName) {
  if (varName === 'fotoEquip') fotoEquip = null;
  else window[varName] = null;
  updateSinglePreview(varName);
}

function renderMultiPageUploaderHTML(pagesVar, inputId) {
  var pgs = getPages(pagesVar);
  var thumbs = pgs.map(function(p, i) {
    return '<div class="page-thumb">'
      + '<img src="' + p.dataUrl + '">'
      + '<button class="del-page" onclick="deletePage(\'' + pagesVar + '\',' + i + ')">✕</button>'
      + '<span class="page-num">' + (i+1) + '</span>'
      + '</div>';
  }).join('');

  return '<div class="pages-grid" id="' + pagesVar + '_grid">' + thumbs + '</div>'
    + '<div class="pages-actions">'
    + '<button class="btn-secondary" onclick="document.getElementById(\'' + inputId + '\').click()">📄 PDF</button>'
    + '<button class="btn-secondary" onclick="triggerImgUpload(\'' + inputId + '_img\')">🖼 Imagens</button>'
    + '</div>'
    + '<input type="file" id="' + inputId + '" accept="application/pdf" style="display:none">'
    + '<input type="file" id="' + inputId + '_img" accept="image/*" multiple style="display:none">';
}

function triggerImgUpload(id) {
  var el = document.getElementById(id);
  if (el) el.click();
}

function bindMultiUploader(pagesVar, inputId, pagesArray, isPdf) {
  var pdfInput = document.getElementById(inputId);
  var imgInput = document.getElementById(inputId + '_img');
  if (pdfInput) {
    pdfInput.addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;
      renderPDFPages(file, pagesVar);
      e.target.value = '';
    });
  }
  if (imgInput) {
    imgInput.addEventListener('change', function(e) {
      var files = Array.from(e.target.files);
      var arr = getPages(pagesVar);
      var pending = files.length;
      files.forEach(function(file) {
        var r = new FileReader();
        r.onload = function(ev) {
          arr.push({dataUrl: ev.target.result});
          setPages(pagesVar, arr);
          pending--;
          if (pending === 0) refreshGrid(pagesVar);
        };
        r.readAsDataURL(file);
      });
      e.target.value = '';
    });
  }
}

function getPages(varName) {
  if (varName === 'artPages') return artPages;
  if (varName === 'comprovPages') return comprovPages;
  if (varName === 'endPhotos') return endPhotos;
  if (varName === 'calibManPages') return calibManPages;
  if (varName === 'calibPsvPages') return calibPsvPages;
  return [];
}

function setPages(varName, arr) {
  if (varName === 'artPages') { artPages = arr; }
  else if (varName === 'comprovPages') { comprovPages = arr; }
  else if (varName === 'endPhotos') { endPhotos = arr; }
  else if (varName === 'calibManPages') { calibManPages = arr; }
  else if (varName === 'calibPsvPages') { calibPsvPages = arr; }
}

function deletePage(varName, idx) {
  var arr = getPages(varName);
  arr.splice(idx, 1);
  setPages(varName, arr);
  refreshGrid(varName);
}

function refreshGrid(varName) {
  var pgs = getPages(varName);
  var grid = document.getElementById(varName + '_grid');
  if (!grid) return;
  grid.innerHTML = pgs.map(function(p, i) {
    return '<div class="page-thumb">'
      + '<img src="' + p.dataUrl + '">'
      + '<button class="del-page" onclick="deletePage(\'' + varName + '\',' + i + ')">✕</button>'
      + '<span class="page-num">' + (i+1) + '</span>'
      + '</div>';
  }).join('');
}

function renderPDFPages(file, varName) {
  if (typeof pdfjsLib === 'undefined') { alert('PDF.js nao carregado.'); return; }
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  var reader = new FileReader();
  reader.onload = function(e) {
    pdfjsLib.getDocument({data: e.target.result}).promise.then(function(pdf) {
      var arr = getPages(varName);
      var total = pdf.numPages;
      var done = 0;
      for (var i = 1; i <= total; i++) {
        (function(pgNum) {
          pdf.getPage(pgNum).then(function(page) {
            var vp = page.getViewport({scale: 1.5});
            var canvas = document.createElement('canvas');
            canvas.width = vp.width; canvas.height = vp.height;
            var ctx = canvas.getContext('2d');
            page.render({canvasContext: ctx, viewport: vp}).promise.then(function() {
              arr.push({dataUrl: canvas.toDataURL('image/jpeg', 0.85)});
              done++;
              if (done === total) { setPages(varName, arr); refreshGrid(varName); }
            });
          });
        })(i);
      }
    });
  };
  reader.readAsArrayBuffer(file);
}

function trow(label, val) {

function buildDoc(d) {

    + 'RUA EE, 35 - ARVOREDO - CONTAGEM/MG<br>'
    + 'TEL: (31) 3485-7222 - (31) 9 9350-3718 - alc.compressores@hotmail.com'

    + trow('Pressao de Operacao (Bar)', d.op_pressao_op)
    + trow('Temperatura de Operacao (C)', d.op_temp_op) + '</table>'
    + '</div>';

  var secProjeto = '<div class="pg">' + HDR(d)
    + '<h2>7. DADOS DE PROJETO</h2>'
    + '<table>' + trow('Referencia do Projeto', d.proj_codigo)
    + trow('Diametro Nominal Interno (mm)', d.proj_diam_interno)
    + trow('Geometria dos Tampos', d.proj_geom_tampo)

    + '<table>' + trow('Valvula de Seguranca', d.seg_psv)

  var et = parseFloat((d.pmta_e_tamp||'').replace(',','.'));
  var espT = parseFloat((d.pmta_esp_tamp||'').replace(',','.'));
  var pmtaC = (!isNaN(sc)&&!isNaN(ec)&&!isNaN(espC)&&!isNaN(R)) ? ((sc*ec*espC)/(R-0.6*espC)*10).toFixed(2)+' bar' : '—';
  var pmtaT = (!isNaN(st)&&!isNaN(et)&&!isNaN(espT)&&!isNaN(R)) ? ((st*et*espT)/(R+0.1*espT)*10).toFixed(2)+' bar' : '—';

    + '<div class="body-text">' + (d.notas_tecnicas||'').replace(/\n/g,'<br>') + '</div>'
    + '</div>';

  // ENDs
  var endsHTML = '';
  if (endPhotos.length > 0) {
    var endGrid = '<div class="end-grid">'
      + endPhotos.map(function(p,i){
          return '<div class="foto-box"><img src="'+p.dataUrl+'" style="max-height:150px;max-width:100%"><div class="foto-label">Foto '+(i+1)+'</div></div>';

        + '<h2>15. ENSAIOS NAO DESTRUTIVOS - ENDs</h2>'
        + '<div class="end-grid">'
        + chunk.map(function(p,j){
            return '<div class="foto-box"><img src="'+p.dataUrl+'" style="max-height:150px;max-width:100%;border:1px solid #ccc"><div class="foto-label">Foto '+(i+j+1)+'</div></div>';
          }).join('')

  // Calibração Manômetro (sec 16)
  var calibManHTML = calibManPages.map(function(p,i){
    return '<div class="pg">'+HDR(d)+(i===0?'<h2>16. CERTIFICADO DE CALIBRACAO - MANOMETRO PADRAO</h2>':'')

  // Calibração PSV (sec 17)

  // Conclusão (sec 18)
  var conclusaoHTML = '<div class="pg">' + HDR(d)

    + '<div class="body-text">' + (d.conclusao_texto||'').replace(/\n/g,'<br>') + '</div>'

  // ART pages
  var artHTML = artPages.map(function(p,i){
    return '<div class="pg">'+HDR(d)+(i===0?'<h2>1. ART REFERENTE A OBRA/SERVICO</h2>':'')

}

// ============================================================
// GERAR WORD / PDF
// ============================================================
function gerarWord() {
  var d = Object.assign({}, fd);
  var html = buildDoc(d);
  var blob = new Blob(['﻿', html], {type:'application/msword'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  var nome = (d.cliente_nome||'Cliente').replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
  a.download = 'Prontuario_VP' + (d.vp_numero||'01') + '_' + nome + '.doc';
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){ URL.revokeObjectURL(url); document.body.removeChild(a); }, 2000);
}

function gerarPDF() {
  var d = Object.assign({}, fd);
  var html = buildDoc(d);
  var win = window.open('','_blank');
  if (!win) { alert('Permita popups para gerar PDF.'); return; }
  win.document.write(html);
  win.document.close();
  setTimeout(function(){ win.focus(); win.print(); }, 800);
}

// ============================================================
// FIREBASE SAVE
// ============================================================
function salvarRegistro() {
  var statusEl = document.getElementById('gerar-status');
  if (statusEl) statusEl.textContent = 'Salvando...';
  var session = null;
  try { session = JSON.parse(localStorage.getItem('alc_session')||'null'); } catch(e){}
  var doc = {
    modulo: 'Prontuario',
    data: new Date().toISOString(),
    uid: session ? session.uid : 'desconhecido',
    usuario: session ? (session.name||session.username||'') : '',
    cliente: fd.cliente_nome,
    relatorio: fd.num_relatorio,
    vaso_serie: fd.vaso_serie,
    vp_numero: fd.vp_numero,
    data_inicio: fd.data_inicio,
    data_fim: fd.data_fim,
    formData: fd
  };
  if (typeof firebase !== 'undefined' && firebase.firestore) {
    firebase.firestore().collection('registros').add(doc)
      .then(function(ref) {
        if (statusEl) statusEl.textContent = 'Salvo com sucesso! ID: ' + ref.id;
      })
      .catch(function(e) {
        if (statusEl) statusEl.textContent = 'Erro ao salvar: ' + e.message;
      });
  } else {
    if (statusEl) statusEl.textContent = 'Firebase nao disponivel.';
  }
}
