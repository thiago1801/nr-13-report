<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ALC Compressores — Login</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#212F62">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ALC Laudos">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(150deg, #212F62 0%, #111827 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    }

    .logo-area { text-align: center; margin-bottom: 28px; }
    .logo-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 72px; height: 72px;
      background: #212F62; border-radius: 18px; margin-bottom: 14px;
    }
    .logo-badge svg { width: 44px; height: 44px; }
    .logo-area h1 { font-size: 20px; font-weight: 800; color: #212F62; }
    .logo-area p  { font-size: 13px; color: #64748b; margin-top: 4px; }

    .error-box {
      background: #fef2f2; border: 1.5px solid #fecaca;
      color: #dc2626; border-radius: 10px;
      padding: 10px 14px; font-size: 13px;
      margin-bottom: 16px; display: none;
    }

    /* ── Google button ── */
    .btn-google {
      width: 100%; padding: 13px 14px;
      background: #fff; color: #374151;
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 10px;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 20px;
      font-family: inherit;
    }
    .btn-google:hover { border-color: #94a3b8; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .btn-google img { width: 20px; height: 20px; }

    /* ── Divisor ── */
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 18px; color: #94a3b8; font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #e2e8f0;
    }

    /* ── Fields ── */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 5px; }
    .field input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: 15px; color: #111; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: #fafafa; font-family: inherit;
    }
    .field input:focus {
      border-color: #212F62;
      box-shadow: 0 0 0 3px rgba(33,47,98,0.1);
      background: #fff;
    }

    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 46px; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: #94a3b8; font-size: 20px;
      display: flex; align-items: center;
    }

    .btn-login {
      width: 100%; padding: 13px;
      background: #C81F25; color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 4px;
      transition: background 0.15s;
      font-family: inherit;
    }
    .btn-login:hover:not(:disabled) { background: #a81820; }
    .btn-login:disabled { background: #94a3b8; cursor: not-allowed; }

    .footer {
      text-align: center; margin-top: 24px;
      font-size: 12px; color: #94a3b8;
    }
    .footer a { color: #212F62; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
<div class="card">

  <div class="logo-area">
    <div class="logo-badge" style="background:transparent;border-radius:0">
      <img src="icons/icon-192.png" style="width:72px;height:72px;border-radius:16px;display:block"/>
    </div>
    <h1>ALC Compressores</h1>
    <p>Sistema de Inspeção e Laudos</p>
  </div>

  <div class="error-box" id="err"></div>

  <!-- Botão Google -->
  <button class="btn-google" onclick="doGoogleLogin()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    Entrar com Google
  </button>

  <div class="divider">ou entre com usuário e senha</div>

  <!-- Formulário usuário/senha -->
  <div class="field">
    <label for="username">Usuário</label>
    <input type="text" id="username" placeholder="Digite seu usuário"
           autocomplete="username" autocapitalize="none" spellcheck="false">
  </div>

  <div class="field">
    <label for="password">Senha</label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="Digite sua senha"
             autocomplete="current-password">
      <button class="pw-toggle" onclick="togglePw()" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <button class="btn-login" id="btn-login" onclick="doLogin()">Entrar</button>

  <div class="footer">
    ALC Compressores &copy; 2026 &nbsp;·&nbsp;
    <a href="setup.html">Primeiro acesso?</a>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
  const db   = firebase.firestore();
  const auth = firebase.auth();

  // ── Verifica sessão já existente ──
  (function(){
    try {
      const s = JSON.parse(localStorage.getItem('alc_session') || 'null');
      if (s && s.uid && (Date.now() - s.loginTime) < 8*60*60*1000) {
        window.location.replace('menu.html');
      }
    } catch(e) { localStorage.removeItem('alc_session'); }
  })();

  // ── Verifica resultado de redirect do Google ──
  auth.getRedirectResult().then(async result => {
    if (result && result.user) {
      const cred = firebase.auth.GoogleAuthProvider.credentialFromResult(result);
      await handleGoogleUser(result.user, cred && cred.accessToken);
    }
  }).catch(e => {
    if (e.code !== 'auth/no-auth-event') showError('Erro no login com Google: ' + e.message);
  });

  function togglePw() {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  function showError(msg) {
    const el = document.getElementById('err');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // ── Login com Google ──
  async function doGoogleLogin() {
    document.getElementById('err').style.display = 'none';
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });
      // Permissão extra para anexar laudos/arquivos no Google Drive (pasta NR13/ano/mês)
      provider.addScope('https://www.googleapis.com/auth/drive.file');
      const result = await auth.signInWithPopup(provider);
      const cred = firebase.auth.GoogleAuthProvider.credentialFromResult(result);
      await handleGoogleUser(result.user, cred && cred.accessToken);
    } catch(e) {
      if (e.code === 'auth/popup-closed-by-user' || e.code === 'auth/cancelled-popup-request') return;
      showError('Erro ao entrar com Google. Tente novamente.');
    }
  }

  async function handleGoogleUser(firebaseUser, driveAccessToken) {
    try {
      // Busca perfil pelo e-mail Google no Firestore
      const snap = await db.collection('users')
        .where('email', '==', firebaseUser.email).limit(1).get();

      if (snap.empty) {
        await auth.signOut();
        showError('Conta Google não autorizada. Peça ao administrador para liberar seu acesso.');
        return;
      }

      const profile = snap.docs[0].data();
      if (profile.active === false) {
        await auth.signOut();
        showError('Usuário desativado. Contate o administrador.');
        return;
      }

      localStorage.setItem('alc_session', JSON.stringify({
        uid:       snap.docs[0].id,
        username:  profile.username || firebaseUser.displayName,
        name:      profile.name || firebaseUser.displayName,
        role:      profile.role,
        loginTime: Date.now(),
        driveAccessToken: driveAccessToken || null,
        driveTokenTime: driveAccessToken ? Date.now() : null
      }));

      window.location.replace('menu.html');
    } catch(e) {
      showError('Erro ao carregar perfil. Tente novamente.');
    }
  }

  // ── Login usuário/senha ──
  async function doLogin() {
    const username = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btn-login');

    document.getElementById('err').style.display = 'none';
    if (!username || !password) { showError('Preencha usuário e senha.'); return; }

    btn.disabled = true;
    btn.textContent = 'Entrando...';

    try {
      const email = username + '@alc.internal';
      const cred  = await auth.signInWithEmailAndPassword(email, password);

      const doc = await db.collection('users').doc(cred.user.uid).get();
      if (!doc.exists) throw new Error('Perfil não encontrado. Contate o administrador.');

      const profile = doc.data();
      if (profile.active === false) throw new Error('Usuário desativado. Contate o administrador.');

      localStorage.setItem('alc_session', JSON.stringify({
        uid:       cred.user.uid,
        username:  profile.username,
        name:      profile.name,
        role:      profile.role,
        loginTime: Date.now()
      }));

      window.location.replace('menu.html');

    } catch(e) {
      let msg = 'Usuário ou senha incorretos.';
      if (e.code === 'auth/too-many-requests') msg = 'Muitas tentativas. Tente mais tarde.';
      if (e.code === 'auth/network-request-failed') msg = 'Sem conexão. Verifique sua rede.';
      if (e.message && !e.code) msg = e.message;
      showError(msg);
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
