<script>
(function(){
  try {
    var s = JSON.parse(localStorage.getItem('alc_session') || 'null');
    if (!s || !s.uid || (Date.now() - s.loginTime) >= 8*60*60*1000) {
      localStorage.removeItem('alc_session');
      window.location.replace('login.html');
    }
  } catch(e) { window.location.replace('login.html'); }
})();
</script>

<style>
:root{
  --bg:#0f1117;--card:#1a1d27;--border:#2a2d3e;--accent:#3b82f6;
  --success:#22c55e;--warn:#f59e0b;--danger:#ef4444;
  --text:#e2e8f0;--muted:#64748b;--label:#94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
input,button,select,textarea{font-family:inherit;}
#app{display:none;flex-direction:column;min-height:100vh;}
.app-header{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.app-header h2{font-size:14px;font-weight:800;}
.hdr-meta{font-size:11px;color:var(--muted);margin-top:1px;}
.hdr-actions{display:flex;gap:7px;align-items:center;}
.btn-sm{padding:5px 11px;border:none;border-radius:7px;cursor:pointer;font-size:11px;font-weight:700;}
.tab-nav{display:flex;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--border);padding:0 10px;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tab-nav::-webkit-scrollbar{display:none;}
.tab-nav button{padding:10px 13px;border:none;background:none;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;}
.tab-nav button.active{color:var(--accent);border-bottom-color:var(--accent);}
.content{flex:1;overflow-y:auto;padding:16px;max-width:760px;width:100%;margin:0 auto;}
.sec-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px;}
.sec-sub{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.6;}
.row2{display:flex;flex-wrap:wrap;gap:10px;}
.half{width:calc(50% - 5px);}
.full{width:100%;}
@media(max-width:520px){.half{width:100%;}}
.field-mb{margin-bottom:10px;}
.field-lbl{display:block;font-size:10px;font-weight:700;color:var(--label);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;}
.field-inp{width:100%;padding:8px 11px;background:#12151f;border:1.5px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);outline:none;transition:border .15s;}
.field-inp:focus{border-color:var(--accent);}
.field-sel{width:100%;padding:8px 11px;background:#12151f;border:1.5px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);outline:none;appearance:none;}
.msg-ok{background:#052e16;border:1px solid #16a34a;border-radius:8px;padding:10px 14px;font-size:12px;color:var(--success);margin-bottom:12px;}
.msg-err{background:#2d0a0a;border:1px solid #dc2626;border-radius:8px;padding:10px 14px;font-size:12px;color:#fca5a5;margin-bottom:12px;}
.single-photo{background:#12151f;border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;}
.sp-title{font-size:12px;font-weight:700;margin-bottom:9px;}
.sp-preview{position:relative;border-radius:7px;overflow:hidden;margin-bottom:8px;}
.sp-preview img{width:100%;max-height:180px;object-fit:cover;border-radius:7px;display:block;}
.sp-del{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.7);border:none;color:#fff;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:13px;font-weight:700;}
.sp-empty{background:#0a0d14;border:1.5px dashed var(--border);border-radius:7px;height:80px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;margin-bottom:9px;}
.add-btns{display:flex;gap:7px;margin-top:5px;}
.btn-file{flex:1;padding:8px;background:#1e3a5f;color:#60a5fa;border:1.5px dashed #1e40af;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;text-align:center;}
.btn-cam{flex:1;padding:8px;background:#0f2d1f;color:#4ade80;border:1.5px dashed #166534;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;text-align:center;}
.gen-summary{background:#0c1a2e;border:1px solid #1e40af;border-radius:12px;padding:14px;margin-bottom:16px;}
.gen-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1e3a5f;font-size:12px;}
.gen-btns{display:flex;gap:10px;flex-wrap:wrap;}
.btn-word{flex:1;min-width:120px;padding:13px;background:#1e3a5f;color:#60a5fa;border:1.5px solid #1e40af;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;}
.btn-pdf{flex:1;min-width:120px;padding:13px;background:#1f0a00;color:#f97316;border:1.5px solid #9a3412;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;}
.btn-disabled{opacity:.45;cursor:not-allowed!important;}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes spin{to{transform:rotate(360deg)}}
.ocr-bar{background:#0c1a2e;border:1px solid #1e40af;border-radius:7px;padding:7px 11px;margin-bottom:8px;font-size:11px;color:#93c5fd;}
.tipo-sel{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.tipo-btn{flex:1;min-width:120px;padding:14px 10px;background:var(--card);border:2px solid var(--border);border-radius:10px;cursor:pointer;text-align:center;font-size:12px;font-weight:700;color:var(--muted);transition:all .15s;}
.tipo-btn.active{background:#1e3a5f;border-color:var(--accent);color:var(--text);}
.tipo-icon{font-size:22px;margin-bottom:4px;display:block;}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:1000;align-items:center;justify-content:center;padding:16px;}
#modal.open{display:flex;}
.modal-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:82vh;overflow-y:auto;}
</style>
</head>
<body>

<div id="app">
  <div class="app-header">
    <div>
      <h2>&#x1F527; Calibracao | ALC Compressores</h2>
      <div class="hdr-meta" id="hdr-meta">&#x2014;</div>
    </div>
    <div class="hdr-actions">
      <button id="btn-approve" class="btn-sm" style="background:#7c3aed;color:#fff;display:none" onclick="openModal()">&#x1F465;</button>
      <span id="hdr-user" style="font-size:11px;color:var(--muted)"></span>
      <a href="menu.html" class="btn-sm" style="background:#1e293b;color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;gap:4px">&#x2190; Menu</a>
      <button class="btn-sm" style="background:#1e293b;color:var(--muted)" onclick="logout()">Sair</button>
    </div>
  </div>
  <div class="tab-nav" id="tab-nav"></div>
  <div class="content" id="content"></div>
</div>

<div id="modal">
<div class="modal-card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <h3 style="font-weight:800">&#x1F465; Gestao de Usuarios</h3>
    <button onclick="closeModal()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px">x</button>
  </div>
  <div id="modal-body">Carregando...</div>
</div>
</div>

const UK='laudo_users_v4';
function lsG(k){try{return JSON.parse(localStorage.getItem(k)||'null')}catch{return null}}
function lsS(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function getUsers(){return lsG(UK)||[];}
function saveUsers(u){lsS(UK,u);}
const MASTER={username:'admin',password:'admin123',role:'master',approved:true};

function loginAs(u){
  currentUser=u;
  document.getElementById('app').style.display='flex';
  document.getElementById('hdr-user').textContent='Logged: '+u.username;
  if(u.role==='master') document.getElementById('btn-approve').style.display='';
  renderTabNav(); renderContent(); updateHeader();
}
function logout(){localStorage.removeItem('alc_session');window.location.replace('login.html');}
function openModal(){document.getElementById('modal').classList.add('open');renderModal();}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function renderModal(){
  const users=getUsers(),pending=users.filter(u=>!u.approved),approved=users.filter(u=>u.approved);
  let h='<div style="font-size:11px;font-weight:700;color:var(--warn);text-transform:uppercase;margin-bottom:8px">Pendentes ('+pending.length+')</div>';
  if(!pending.length) h+='<p style="color:var(--muted);font-size:12px;margin-bottom:14px">Nenhuma solicitacao.</p>';
  pending.forEach(u=>{h+='<div style="background:#12151f;border-radius:8px;padding:9px 13px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center"><span>'+u.username+'</span><div style="display:flex;gap:7px"><button onclick="approveUser(\''+u.username+'\')" style="padding:5px 11px;background:#16a34a;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">Aprovar</button><button onclick="removeUser(\''+u.username+'\')" style="padding:5px 11px;background:#dc2626;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">X</button></div></div>';});
  h+='<div style="font-size:11px;font-weight:700;color:var(--success);text-transform:uppercase;margin:12px 0 8px">Aprovados ('+approved.length+')</div>';
  approved.forEach(u=>{h+='<div style="background:#12151f;border-radius:8px;padding:9px 13px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center"><span>'+u.username+'</span><button onclick="removeUser(\''+u.username+'\')" style="padding:4px 10px;background:#7f1d1d;color:#fca5a5;border:none;border-radius:6px;font-size:11px;cursor:pointer">Remover</button></div>';});
  document.getElementById('modal-body').innerHTML=h;
}
function approveUser(un){saveUsers(getUsers().map(x=>x.username===un?{...x,approved:true}:x));renderModal();}
function removeUser(un){saveUsers(getUsers().filter(x=>x.username!==un));renderModal();}

const TABS=[
  {id:'capa',label:'Capa'},
  {id:'dados',label:'4. Dados'},
  {id:'dispositivos',label:'11. Dispositivos'},
  {id:'anexos',label:'Anexos'},
  {id:'gerar',label:'Gerar'},
];
function renderTabNav(){
  document.getElementById('tab-nav').innerHTML=TABS.map(t=>
    '<button class="'+(currentTab===t.id?'active':'')+'" onclick="switchTab(\''+t.id+'\')">'+t.label+'</button>'
  ).join('');
}
function switchTab(id){currentTab=id;renderTabNav();renderContent();}
function updateHeader(){
  document.getElementById('hdr-meta').textContent=
    'VP '+formData.vp_numero+' - '+(formData.num_relatorio||'S/N')+' - '+((formData.cliente_nome||'').split(' ').slice(0,2).join(' ')||'---');
}

function fld(label,key,cls,type){
  cls=cls||'full'; type=type||'text';
  return '<div class="field-mb '+cls+'"><label class="field-lbl">'+label+'</label><input class="field-inp" type="'+type+'" value="'+(formData[key]||'').replace(/"/g,'&quot;')+'" oninput="formData[\''+key+'\']=this.value;updateHeader()"/></div>';
}

function renderContent(){
  var map={capa:renderCapa,dados:renderDados,dispositivos:renderDispositivos,anexos:renderAnexos,gerar:renderGerar};
  document.getElementById('content').innerHTML=(map[currentTab]||renderDados)();
}

function renderCapa(){
  return '<div class="sec-title">Capa do Relatorio</div>'
  +'<div class="sec-sub">Dados basicos que identificam o relatorio na capa do laudo.</div>'
  +'<div class="row2">'
  +fld('Nome do Cliente','cliente_nome')
  +fld('Endereco (Rua, Numero, Bairro)','cliente_end')
  +fld('Cidade / Estado / CEP','cliente_cidade')
  +fld('CNPJ','cliente_cnpj','half')
  +fld('VP No','vp_numero','half')
  +fld('No do Relatorio','num_relatorio','half')
  +fld('Descricao do Equipamento (linha 1)','equip_linha1')
  +fld('Descricao do Equipamento (linha 2)','equip_linha2')
  +'</div>';
}

function renderDados(){
  return '<div class="sec-title">4. Dados do Cliente</div>'
  +'<div class="sec-sub">Informacoes que aparecem na Secao 4 do laudo de calibracao.</div>'
  +'<div class="row2">'
  +fld('Cliente (nome completo)','cliente')
  +fld('Identificacao do Equipamento','identificacao')

  +fld('No do Relatorio','num_relatorio','half')

}

function renderDispositivos(){

  var isPsv  = tipoDispositivo==='psv'||tipoDispositivo==='ambos';

// ======= FILE HELPERS =======
function fileToDataUrl(file){
  return new Promise(function(res){var r=new FileReader();r.onload=function(e){res(e.target.result);};r.readAsDataURL(file);});
}
async function pdfToImages(file){
  var pdfjsLib=window['pdfjs-dist/build/pdf'];
  if(!pdfjsLib)return[];
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  var ab=await file.arrayBuffer();
  var pdf=await pdfjsLib.getDocument({data:ab}).promise;
  var pages=[];
  for(var i=1;i<=pdf.numPages;i++){
    var page=await pdf.getPage(i);
    var vp=page.getViewport({scale:1.5});
    var canvas=document.createElement('canvas');
    canvas.width=vp.width;canvas.height=vp.height;
    await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
    pages.push({dataUrl:canvas.toDataURL('image/jpeg',0.85),pageNum:i});
  }
  return pages;
}
async function handleARTPdf(file){
  if(!file)return;
  document.getElementById('art-loading').style.display='';
  artPages=await pdfToImages(file);
  document.getElementById('art-loading').style.display='none';
  renderContent();
}
async function handleARTImages(files){
  for(var i=0;i<files.length;i++){
    artPages.push({dataUrl:await fileToDataUrl(files[i]),pageNum:artPages.length+1});
  }
  renderContent();
}
function clearART(){artPages=[];renderContent();}
async function handleComprovImages(files){
  comprovPages=[];
  for(var i=0;i<files.length;i++){
    comprovPages.push({dataUrl:await fileToDataUrl(files[i]),pageNum:i+1});
  }
  renderContent();
}
function clearComprov(){comprovPages=[];renderContent();}
async function handleCalibPdf(key,file){
  if(!file)return;
  var el=document.getElementById('calib-loading-'+key);
  if(el)el.style.display='';
  calibPages[key]=await pdfToImages(file);
  if(el)el.style.display='none';
  renderContent();
}

    calibPages[key].push({dataUrl:await fileToDataUrl(files[i]),pageNum:calibPages[key].length+1});

}

// ======= GENERATE =======
async function doGenerate(tipo,format){
  var btnId='btn-'+(format==='docx'?'word':'pdf')+'-'+tipo;
  var btn=document.getElementById(btnId);
  var msg=document.getElementById('gen-msg');
  if(btn){btn.disabled=true;btn.classList.add('btn-disabled');btn.innerHTML='<span class="spinner"></span>Gerando...';}
  if(msg)msg.innerHTML='';
  var htmlDoc=tipo==='mano'?buildDocManometro():buildDocPSV();
  var tipoLabel=tipo==='mano'?'Manometro':'PSV';
  var vpNum=formData.vp_numero||'01';
  var rel=(formData.num_relatorio||'').replace(/[^\w]/g,'_');
  try{
    if(format==='pdf'){
      var pdfWin=window.open('','_blank');
      if(!pdfWin){alert('Permita popups.');return;}
      var blob=new Blob([htmlDoc],{type:'text/html;charset=utf-8'});
      var blobUrl=URL.createObjectURL(blob);
      pdfWin.location.href=blobUrl;
      pdfWin.addEventListener('load',function(){setTimeout(function(){pdfWin.print();URL.revokeObjectURL(blobUrl);},700);},{once:true});
      if(msg)msg.innerHTML='<div class="msg-ok">PDF aberto - imprima ou salve como PDF.</div>';
    } else {
      var blob=new Blob([htmlDoc],{type:'application/msword'});
      var a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download='Laudo_Calibracao_'+tipoLabel+'_VP'+vpNum+'_'+(rel||'relatorio')+'.doc';
      a.click();
      if(msg)msg.innerHTML='<div class="msg-ok">Arquivo Word baixado!</div>';
    }
    saveRecord('rascunho');
  }catch(e){
    if(msg)msg.innerHTML='<div class="msg-err">Erro: '+e.message+'</div>';
  }finally{
    if(btn){
      btn.disabled=false;btn.classList.remove('btn-disabled');
      var labels={mano_docx:'Word - Manometro',mano_pdf:'PDF - Manometro',psv_docx:'Word - Valvula Seg.',psv_pdf:'PDF - Valvula Seg.'};
      btn.innerHTML=labels[tipo+'_'+format]||'Gerar';
    }
  }
}

function confirmFinalize(){
  if(!confirm('Finalizar o laudo? Ele ficara somente leitura.'))return;
  saveRecord('finalizado');
  isFinalized=true;
  renderContent();
}

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
window.addEventListener('DOMContentLoaded',async function(){
  try{
    var s=JSON.parse(localStorage.getItem('alc_session')||'null');
    if(s&&s.uid&&(Date.now()-s.loginTime)<8*60*60*1000){
      var role=(s.role==='admin'||s.role==='master')?'master':'user';
      loginAs({username:s.name||s.username,role:role});
      var urlId=new URLSearchParams(window.location.search).get('id');
      if(urlId){currentRecordId=urlId;await loadRecord(urlId);}
    }
  }catch(e){console.error(e);}
});

async function saveRecord(status){
  var msgEl=document.getElementById('save-msg');
  if(msgEl)msgEl.innerHTML='<span style="color:#f59e0b">Salvando...</span>';
  try{
    var s=JSON.parse(localStorage.getItem('alc_session')||'null');
    if(!s)throw new Error('Sessao expirada');
    var db=firebase.firestore();
    var data={
      status:status,modulo:'Calibracao',
      cliente:formData.cliente_nome||formData.cliente||'',
      vp:formData.vp_numero||'',relatorio:formData.num_relatorio||'',
      data_calibracao:formData.data_calibracao||'',
      tipo_dispositivo:tipoDispositivo,local:formData.local||'',
      usuario:s.name||s.username,uid:s.uid,
      formData:JSON.parse(JSON.stringify(formData)),
      tipoDispositivo:tipoDispositivo,
      updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
    };
    var docRef;
    if(currentRecordId){
      docRef=db.collection('registros').doc(currentRecordId);
      await docRef.update(data);
    }else{
      data.createdAt=firebase.firestore.FieldValue.serverTimestamp();
      docRef=await db.collection('registros').add(data);
      currentRecordId=docRef.id;
    }
    if(msgEl)msgEl.innerHTML=status==='finalizado'
      ?'<span style="color:#22c55e">Laudo finalizado e salvo!</span>'
      :'<span style="color:#22c55e">Rascunho salvo!</span>';
    setTimeout(function(){if(msgEl)msgEl.innerHTML='';},4000);
  }catch(e){
    if(msgEl)msgEl.innerHTML='<span style="color:#fca5a5">Erro ao salvar: '+e.message+'</span>';
  }
}

async function loadRecord(id){
  try{
    var db=firebase.firestore();
    var doc=await db.collection('registros').doc(id).get();
    if(!doc.exists)return;
    var data=doc.data();
    if(data.formData)Object.assign(formData,data.formData);
    if(data.tipoDispositivo)tipoDispositivo=data.tipoDispositivo;
    if(data.status==='finalizado')isFinalized=true;
    updateHeader();renderContent();
  }catch(e){console.error(e);}
}
</script>
